# .github/workflows/update-cyber-data.yml
# Nightly refresh of the Cyber Attack Earth data lake.
#
# SECRETS — set these under Settings > Secrets and variables > Actions.
# Never put credentials in this file or in build_cyber_data.py: this repo is public.
#   CISSM_USER    your cybereventsdatabase.org email      (optional)
#   CISSM_PASS    your cybereventsdatabase.org password   (optional)
#   NVD_API_KEY   free key from nvd.nist.gov              (optional, speeds up CVE backfill)
name: Update cyber data pack

on:
  schedule:
    - cron: "20 3 * * *"   # 03:20 UTC nightly
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data pack
        env:
          CISSM_USER: ${{ secrets.CISSM_USER }}
          CISSM_PASS: ${{ secrets.CISSM_PASS }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          pip install requests
          python3 build_cyber_data.py cyber_data

      - name: Commit if changed
        run: |
          git config user.name "data-pack-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cyber_data
          git diff --cached --quiet || git commit -m "Refresh cyber data pack ($(date -u +%F))"
          git push
